[package]
name = "pix-engine"
version = "0.3.3"
license = "GPL-3.0-or-later"
description = "A simple, cross-platform graphics/UI engine framework with a minimal interface."
authors = ["Luke Petherbridge <me@lukeworks.tech>"]
readme = "README.md"
documentation = "https://github.com/lukexor/pix-engine"
repository = "https://github.com/lukexor/pix-engine.git"
homepage = "https://github.com/lukexor/pix-engine"
edition = "2018"

[lib]
name = "pix_engine"
path = "src/lib.rs"

[dependencies]
assert_approx_eq = "~1.1.0"
bitflags = "~1.2.1"
lazy_static = "~1.4.0"
num = "~0.2.1"
png = "~0.16.3"
rand = "~0.7.3"
rayon = "~1.3.0"
regex = "~1.3.7"
sdl2 = { version = "~0.34.0", features = ["gfx", "image", "ttf"], optional = true }
wasm-bindgen = { version = "~0.2.60", optional = true }

[features]
default = ["sdl2-renderer"]
sdl2-renderer = ["sdl2"]
wasm-renderer = ["wasm-bindgen"]
